name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npm test

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Security audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --quiet
          cargo audit

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude Conductor ${{ github.ref_name }}"
          releaseBody: "See the assets for macOS and Linux installers."
          releaseDraft: true

  build-fedora:
    needs: test
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make \
            webkit2gtk4.1-devel \
            gtk3-devel \
            libappindicator-gtk3-devel \
            pango-devel \
            cairo-devel \
            gdk-pixbuf2-devel \
            glib2-devel \
            openssl-devel \
            curl wget \
            rpm-build \
            nodejs npm

      - name: Install Rust
        run: |
          dnf install -y rustup 2>/dev/null || (curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal)
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup default stable

      - run: npm ci

      - name: Build Tauri app
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          npx tauri build --bundles rpm

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: fedora-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/rpm/*.rpm
          draft: true
